<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#f59e0b" />
      <stop offset="100%" stopColor="#f43f5e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#f59e0b" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Outer Hexagon -->
    <path d="M20 2 L36 10 L36 30 L20 38 L4 30 L4 10 Z" fill="url(#logo-gradient)" opacity="0.15"/>
    <path d="M20 2 L36 10 L36 30 L20 38 L4 30 L4 10 Z" fill="none" stroke="url(#logo-gradient)" stroke-width="1.5"/>
    
    <!-- Inner 3D Cube Lines -->
    <path d="M20 18 L20 38" stroke="url(#logo-gradient)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M4 10 L20 18 L36 10" stroke="url(#logo-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Abstract Spark/Forge Core -->
    <polygon points="20,10 24,18 20,26 16,18" fill="#ffffff">
      <animateTransform attributeName="transform" type="rotate" from="0 20 18" to="360 20 18" dur="4s" repeatCount="indefinite" />
    </polygon>
  </g>
</svg>
